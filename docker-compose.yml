services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobcrafts_backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app/backend
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn resumeai_backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobcrafts_frontend
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=/api/v1
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173

  nginx:
    image: nginx:latest
    container_name: jobcrafts_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/staticfiles:/app/backend/staticfiles
      - ./backend/media:/app/backend/media
    depends_on:
      - frontend
      - backend